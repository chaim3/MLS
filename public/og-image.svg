    <rect x="20" y="20" width="25" height="25" rx="2" fill="#93c5fd"/>
    <rect x="55" y="20" width="25" height="25" rx="2" fill="#93c5fd"/>
    <rect x="20" y="55" width="25" height="25" rx="2" fill="#93c5fd"/>
