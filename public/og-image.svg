    <path d="M60 20 L100 50 L96 50 L96 100 L76 100 L76 70 L44 70 L44 100 L24 100 L24 50 L20 50 Z" fill="white"/>
    <rect x="52" y="70" width="16" height="30" fill="#93c5fd" rx="2"/>
